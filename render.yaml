services:
  - type: web
    name: careercopolit-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false        # you'll paste this in Render dashboard
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: JOBRIGHT_MAX_JOBS
        value: "60"
      - key: USE_DYNAMODB
        value: "false"
      - key: PORT
        value: "8000"
    healthCheckPath: /health
